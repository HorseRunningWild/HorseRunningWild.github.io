<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Noto+Serif+SC:wght@300;500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
  /* --- 强力修复：初始状态隐藏侧边栏和系统内容 --- */
  .sidebar, .archive__item, .page__title, .pagination { 
    display: none !important; 
    opacity: 0; 
  }

  /* --- 门户布局 --- */
  #portal-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    padding-top: 50px;
    font-family: 'Montserrat', sans-serif;
    background: transparent;
  }

  .portal-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    font-style: italic;
    color: #2c3e50;
    margin-bottom: 60px;
    letter-spacing: -1px;
  }

  /* --- Fancy 卡片设计 --- */
  .card-row { display: flex; gap: 40px; margin-bottom: 40px; }

  .fancy-card {
    position: relative;
    background: #ffffff;
    border-radius: 24px;
    padding: 40px 30px;
    width: 280px;
    text-align: center;
    cursor: pointer;
    /* 柔和的多层阴影，营造悬浮感 */
    box-shadow: 0 10px 30px rgba(0,0,0,0.04), 0 2px 10px rgba(0,0,0,0.02);
    transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
    border: 1px solid rgba(0,0,0,0.03);
    overflow: hidden;
    z-index: 1000; /* 确保点击优先 */
  }

  /* 卡片内部装饰线 */
  .fancy-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 0; height: 3px;
    background: #90b4ce; /* 莫兰迪蓝色 */
    transition: width 0.4s ease;
  }

  .fancy-card:hover {
    transform: translateY(-12px);
    box-shadow: 0 30px 60px rgba(0,0,0,0.08);
    border-color: #90b4ce;
  }

  .fancy-card:hover::after { width: 100%; }

  .fancy-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    margin: 0;
    color: #34495e;
  }

  .fancy-card p {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #95a5a6;
    margin-top: 15px;
  }

  /* --- 返回按钮：精致的半透明设计 --- */
  #back-btn {
    display: none;
    position: fixed;
    top: 120px;
    left: 40px;
    z-index: 9999;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(10px);
    border: 1px solid #ddd;
    width: 50px; height: 50px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    transition: 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }
  #back-btn:hover { background: #fff; transform: scale(1.1); }

  /* --- 内容容器动画 --- */
  #dynamic-content {
    display: none;
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease;
    margin-top: 20px;
  }

  .content-active {
    display: block !important;
    opacity: 1 !important;
    transform: translateY(0) !important;
  }
</style>

<div id="portal-wrapper">
  <h1 class="portal-title">Welcome to the world of Wild Horse!</h1>
  
  <div class="card-row">
    <div class="fancy-card" onclick="openPage('academic')">
      <h3>Who am I?</h3>
      <p>Real Life Version</p>
    </div>
    
    <div class="fancy-card" onclick="openPage('academic')">
      <h3>Who am I?</h3>
      <p>Academic Version</p>
    </div>
  </div>

  <div class="fancy-card" style="width: 600px;" onclick="openPage('academic')">
    <h3>What Can You Get From this Website</h3>
  </div>
</div>

<button id="back-btn" onclick="closePage()">←</button>

<div id="dynamic-content">
  <div class="archive">
    {% include about-content.html %}
  </div>
</div>

<script>
  function openPage(type) {
    console.log("Card clicked: " + type); // 调试用
    
    // 1. 隐藏门户
    document.getElementById('portal-wrapper').style.display = 'none';
    
    // 2. 强行显示侧边栏 (利用 JS 修改 style 优先级最高)
    const sidebar = document.querySelector('.sidebar');
    if (sidebar) {
      sidebar.setAttribute('style', 'display: block !important; opacity: 1 !important;');
    }
    
    // 3. 显示内容区域
    const content = document.getElementById('dynamic-content');
    content.classList.add('content-active');
    
    // 4. 显示返回按钮
    document.getElementById('back-btn').style.display = 'block';
    
    // 平滑滚动回顶部
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function closePage() {
    // 简单高效的回退：刷新页面
    window.location.reload();
  }
</script>
