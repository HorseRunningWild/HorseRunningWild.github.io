<!-- 引入艺术字体 -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
  /* --- 1. 强力布局重置（解决偏移中心问题） --- */
  #main {
    max-width: 100% !important;
    padding: 0 !important;
    margin: 0 !important;
    display: block !important; /* 初始不使用 flex，防止侧边栏占位 */
  }
  
  /* 初始彻底隐藏侧边栏 */
  .sidebar { 
    display: none !important; 
    opacity: 0;
    width: 0 !important;
  }

  /* --- 2. 门户容器样式 --- */
  #portal-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh; /* 垂直居中 */
    width: 100%;
    transition: all 0.6s ease;
  }

  .portal-title {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-style: italic;
    color: #2c3e50;
    margin-bottom: 80px; /* 标题与卡片的间距 */
    text-align: center;
  }

  /* --- 3. Fancy 卡片设计与大间距 --- */
  .card-row { 
    display: flex; 
    gap: 60px; /* 卡片横向间距 */
    margin-bottom: 50px; 
  }

  .fancy-card {
    background: #ffffff;
    border-radius: 20px;
    padding: 45px 35px;
    width: 300px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 1px solid rgba(0,0,0,0.03);
    z-index: 999;
  }

  .fancy-card:hover {
    transform: translateY(-12px);
    box-shadow: 0 25px 50px rgba(0,0,0,0.1);
    border-color: #90b4ce;
  }

  .fancy-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    margin: 0;
    color: #34495e;
  }

  .fancy-card p {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #95a5a6;
    margin-top: 15px;
  }

  /* --- 4. 返回按钮 --- */
  #back-btn {
    display: none;
    position: fixed;
    top: 40px;
    left: 40px;
    z-index: 10000;
    background: white;
    border: 1px solid #ddd;
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  /* --- 5. 内容槽位控制 --- */
  #dynamic-content {
    display: none;
    opacity: 0;
    padding: 2em;
    max-width: 1200px;
    margin: 0 auto;
    transform: translateY(30px);
    transition: all 0.7s ease;
  }

  .content-slot { display: none; }
</style>

<!-- 门户界面 -->
<div id="portal-wrapper">
  <h1 class="portal-title">Welcome to the world of Wild Horse!</h1>
  
  <div class="card-row">
    <div class="fancy-card" onclick="openPage('reallife')">
      <h3>Who am I?</h3>
      <p>Real Life Version</p>
    </div>
    
    <div class="fancy-card" onclick="openPage('academic')">
      <h3>Who am I?</h3>
      <p>Academic Version</p>
    </div>
  </div>

  <div class="fancy-card" style="width: 660px;" onclick="openPage('website')">
    <h3>What Can You Get From this Website</h3>
  </div>
</div>

<!-- 返回按钮 -->
<button id="back-btn" onclick="location.reload()">← BACK</button>

<!-- 动态内容载入区 -->
<div id="dynamic-content">
  <div id="slot-academic" class="content-slot">
    {% include about-academic.html %}
  </div>
  <div id="slot-reallife" class="content-slot">
    {% include about-reallife.html %}
  </div>
  <div id="slot-website" class="content-slot">
    {% include about-website.html %}
  </div>
</div>

<script>
  function openPage(type) {
    console.log("Attempting to open:", type); // 调试信息
    
    const portal = document.getElementById('portal-wrapper');
    const contentArea = document.getElementById('dynamic-content');
    const sidebar = document.querySelector('.sidebar');
    const backBtn = document.getElementById('back-btn');
    const main = document.getElementById('main');

    // 1. 隐藏入口门户
    portal.style.opacity = '0';
    
    setTimeout(() => {
      portal.style.display = 'none';

      // 2. 显示选中的内容槽位
      document.querySelectorAll('.content-slot').forEach(slot => slot.style.display = 'none');
      const target = document.getElementById('slot-' + type);
      if(target) target.style.display = 'block';

      // 3. 恢复 Minimal Mistakes 侧边栏布局
      main.style.display = 'flex'; // 恢复 flex 布局以承载侧边栏
      if(sidebar) {
        sidebar.setAttribute('style', 'display: block !important; opacity: 1 !important; width: 25% !important;');
      }

      // 4. 显示内容区域
      contentArea.style.display = 'block';
      setTimeout(() => {
        contentArea.style.opacity = '1';
        contentArea.style.transform = 'translateY(0)';
      }, 50);

      // 5. 显示返回按钮
      backBtn.style.display = 'block';
      window.scrollTo(0, 0);
    }, 500);
  }
</script>
