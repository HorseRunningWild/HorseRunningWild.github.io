layout: archive
permalink: /
author_profile: true
---

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
  /* --- 关键：强制全屏居中重置 --- */
  #main {
    max-width: 100% !important; /* 覆盖主题的最大宽度限制 */
    padding: 0 !important;
    margin: 0 !important;
  }
  
  /* 初始隐藏侧边栏及其占位 */
  .sidebar { 
    display: none !important; 
    width: 0 !important;
    opacity: 0;
  }

  /* 移除主内容区域的偏移 */
  .archive {
    width: 100% !important;
    padding-right: 0 !important;
  }

  /* --- 门户容器 --- */
  #portal-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 85vh; /* 增加高度使垂直更居中 */
    width: 100%;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .portal-title {
    font-family: 'Playfair Display', serif;
    font-size: 3.2rem; /* 稍微加大 */
    font-style: italic;
    color: #2c3e50;
    margin-bottom: 90px; /* 增加与卡片的距离 */
    letter-spacing: -1px;
    text-align: center;
  }

  /* --- 卡片布局与间距 --- */
  .card-row { 
    display: flex; 
    gap: 70px; /* 增加卡片横向距离 */
    margin-bottom: 60px; /* 增加与底部长卡片的距离 */
  }

  .fancy-card {
    position: relative;
    background: #ffffff;
    border-radius: 24px;
    padding: 50px 40px;
    width: 320px; /* 稍微加宽 */
    text-align: center;
    cursor: pointer;
    box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 1px solid rgba(0,0,0,0.02);
    z-index: 100; /* 确保在最上层可被点击 */
  }

  .fancy-card:hover {
    transform: translateY(-15px);
    box-shadow: 0 30px 60px rgba(0,0,0,0.1);
    border-color: #90b4ce;
  }

  .fancy-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    margin: 0;
    color: #34495e;
  }

  .fancy-card p {
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #95a5a6;
    margin-top: 20px;
  }

  /* --- 返回按钮 --- */
  #back-btn {
    display: none;
    position: fixed;
    top: 100px;
    left: 40px;
    z-index: 9999;
    background: rgba(255,255,255,0.9);
    border: 1px solid #eee;
    padding: 12px 20px;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    font-family: 'Montserrat', sans-serif;
  }

  /* --- 正文内容容器 --- */
  #dynamic-content {
    display: none;
    opacity: 0;
    width: 100%;
    max-width: 1200px; /* 点击后恢复标准内容宽度 */
    margin: 0 auto;
    padding: 2em;
    transform: translateY(20px);
    transition: all 0.6s ease;
  }
</style>

<div id="portal-wrapper">
  <h1 class="portal-title">Welcome to the world of Wild Horse!</h1>
  
  <div class="card-row">
    <div class="fancy-card" id="btn-academic">
      <h3>Who am I?</h3>
      <p>Academic Version</p>
    </div>
    
    <div class="fancy-card" id="btn-real-life">
      <h3>Who am I?</h3>
      <p>Real Life Version</p>
    </div>
  </div>

  <div class="fancy-card" style="width: 710px;" id="btn-website">
    <h3>What Can You Get From this Website</h3>
  </div>
</div>

<button id="back-btn">← BACK TO PORTAL</button>

<div id="dynamic-content">
  <div class="archive">
    
    <div id="content-academic" class="content-slot" style="display: none;">
      {% include about-academic.html %}
    </div>

    <div id="content-real-life" class="content-slot" style="display: none;">
      {% include about-reallife.html %}
    </div>

    <div id="content-website" class="content-slot" style="display: none;">
      {% include about-website.html %}
    </div>

  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const portal = document.getElementById('portal-wrapper');
  const content = document.getElementById('dynamic-content');
  const backBtn = document.getElementById('back-btn');
  const sidebar = document.querySelector('.sidebar');
  const mainContainer = document.getElementById('main');

  // 定义打开逻辑
  function openPortalContent(contentType) {
    const selectedContent = document.getElementById(`content-${contentType}`);
    if (!selectedContent) {
      console.warn(`Content slot not found: content-${contentType}`);
      return;
    }

    // 1. 隐藏入口
    portal.style.opacity = '0';
    setTimeout(() => {
      portal.style.display = 'none';
      
      // 2. 恢复 Minimal Mistakes 的标准布局
      mainContainer.setAttribute('style', 'max-width: 1280px !important; margin: 0 auto !important; display: flex !important;');
      
      // 3. 激活侧边栏 (移除 display: none)
      if(sidebar) {
        sidebar.setAttribute('style', 'display: block !important; opacity: 1 !important; width: 25% !important;');
      }

      // 4. 显示对应正文内容
      document.querySelectorAll('.content-slot').forEach(slot => {
        slot.style.display = 'none';
      });
      selectedContent.style.display = 'block';

      // 5. 显示正文区域
      content.style.display = 'block';
      setTimeout(() => {
        content.style.opacity = '1';
        content.style.transform = 'translateY(0)';
      }, 50);

      // 6. 显示返回按钮
      backBtn.style.display = 'block';
      window.scrollTo(0, 0);
    }, 400);
  }

  // 绑定点击事件到所有卡片
  document.getElementById('btn-academic').addEventListener('click', () => openPortalContent('academic'));
  document.getElementById('btn-real-life').addEventListener('click', () => openPortalContent('real-life'));
  document.getElementById('btn-website').addEventListener('click', () => openPortalContent('website'));

  // 返回按钮逻辑
  backBtn.addEventListener('click', function() {
    window.location.reload(); // 刷新页面是最干净的返回方式
  });
});
</script>
