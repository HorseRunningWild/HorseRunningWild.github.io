---
layout: default
permalink: /
---

<style>
  /* 隐藏默认的侧边栏和主标题，直到点击卡片 */
  .sidebar, .page__title, .page__content {
    display: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  /* 门户容器布局 */
  #portal-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    gap: 30px;
    font-family: 'Playfair Display', serif; /* 艺术字体 */
  }

  .portal-row {
    display: flex;
    gap: 40px;
    justify-content: center;
    width: 100%;
  }

  /* 2. Fancy 卡片设计 */
  .fancy-card {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px); /* 磨砂玻璃效果 */
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 20px;
    padding: 40px 30px;
    width: 280px;
    text-align: center;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    color: #4a4a4a;
  }

  .fancy-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    background: rgba(255, 255, 255, 0.9);
    border-color: #a8dadc;
  }

  .fancy-card h2 {
    margin: 0;
    font-size: 1.4rem;
    font-weight: 400;
    line-height: 1.4;
  }

  /* 3. 返回按钮 */
  #back-btn {
    display: none;
    position: fixed;
    top: 80px; /* 避开导航栏 */
    left: 20px;
    z-index: 100;
    background: #f1f1f1;
    border: none;
    padding: 10px 15px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  /* 动画类 */
  .fade-out {
    animation: fadeOut 0.5s forwards;
  }

  @keyframes fadeOut {
    from { opacity: 1; transform: scale(1); }
    to { opacity: 0; transform: scale(0.9); pointer-events: none; }
  }
</style>

<div id="portal-container">
  <h1 style="font-weight: 300; margin-bottom: 40px;">Welcome to the world of Wild Horse!</h1>
  
  <div class="portal-row">
    <div class="fancy-card" onclick="showContent('real-life')">
      <h2>Who am I?<br><small>Real Life Version</small></h2>
    </div>
    <div class="fancy-card" onclick="showContent('academic')">
      <h2>Who am I?<br><small>Academic Version</small></h2>
    </div>
  </div>

  <div class="portal-row">
    <div class="fancy-card" style="width: 600px;" onclick="showContent('website')">
      <h2>What Can You Get From this Website</h2>
    </div>
  </div>
</div>

<button id="back-btn" onclick="hideContent()">←</button>

<div id="main-content-area" style="display: none;">
  <article class="page">
    <div id="academic-content">
       {% include about-content.html %} 
    </div>
  </article>
</div>

<script>
function showContent(type) {
  // 1. 隐藏门户，带动画
  const portal = document.getElementById('portal-container');
  portal.classList.add('fade-out');
  
  setTimeout(() => {
    portal.style.display = 'none';
    
    // 2. 显示侧边栏和正文 (Minimal Mistakes 的默认选择器)
    const sidebar = document.querySelector('.sidebar');
    const content = document.getElementById('main-content-area');
    const backBtn = document.getElementById('back-btn');
    
    if(sidebar) {
        sidebar.style.display = 'block';
        setTimeout(() => sidebar.style.opacity = '1', 50);
    }
    
    content.style.display = 'block';
    setTimeout(() => content.style.opacity = '1', 50);
    backBtn.style.display = 'block';

    // 可以在这里根据 type 切换显示不同的 Markdown 块
  }, 500);
}

function hideContent() {
  location.reload(); // 最简单的方法是刷新页面回到初始态，或者手动逆转上面的 display 逻辑
}
</script>
